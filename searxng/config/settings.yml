# SearXNG settings.yml
# Instance : searxng.kiwinet.me
# Usage    : personnel/famille, accès public, rate limiting activé

use_default_settings: true

general:
  instance_name: "Kiwinet Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "fr-FR"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

server:
  base_url: "https://searxng.kiwinet.me/"
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: true
  image_proxy: true
  http_protocol_version: "1.1"

redis:
  url: ""

valkey:
  url: redis://searxng-redis:6379/0

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: fr
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  results_on_new_tab: false
  theme_args:
    simple_style: dark

# Moteurs activés (sélection équilibrée, sources non-GAFAM prioritaires)
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: true       # désactivé par défaut — activer si besoin

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false

  - name: openstreetmap
    engine: openstreetmap
    shortcut: osm
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: docker_hub
    engine: docker_hub
    shortcut: dh
    disabled: false

  - name: stackexchange
    engine: stackexchange
    shortcut: se
    disabled: false

outgoing:
  request_timeout: 6.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
