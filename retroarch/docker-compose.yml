# ─────────────────────────────────────────────
# retroarch/docker-compose.yml
# Service : RetroArch — émulation rétro via navigateur (KasmVNC)
#
# Accès navigateur : https://retroarch.kiwinet.me
# Technologie : lscr.io/linuxserver/retroarch (KasmVNC intégré)
# Architecture : multi-arch — ARM64 natif (aarch64)
#
# Ports internes :
#   3000 → interface web KasmVNC (HTTPS — certificat auto-signé interne)
#   3001 → protocole Selkies (client natif optionnel)
#
# Traefik gère le TLS public. Le container expose en HTTP interne (port 3000),
# Traefik termine le TLS côté client. La directive serverstransport désactive
# la vérification du certificat auto-signé interne du container.
#
# ROMs : montées depuis le sous-dossier local ./roms/ (non versionné)
#        Alimenter manuellement après déploiement — voir README.
#
# BIOS Amiga : obligatoire pour le core PUAE.
#              Déposer dans /config/retroarch/system/ (voir README).
# ─────────────────────────────────────────────

services:
  retroarch:
    image: lscr.io/linuxserver/retroarch:latest
    container_name: retroarch
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./config:/config
      # ROMs depuis le NAS Freebox (montage CIFS /mnt/Kodi — lecture seule)
      # Créer les sous-dossiers côté NAS avant le démarrage :
      #   /mnt/Libraries/ROMs/amstrad, /mnt/Libraries/ROMs/oric, /mnt/Libraries/ROMs/amiga
      - /mnt/Libraries/ROMs/amstrad:/config/retroarch/roms/amstrad:ro
      - /mnt/Libraries/ROMs/oric:/config/retroarch/roms/oric:ro
      - /mnt/Libraries/ROMs/amiga:/config/retroarch/roms/amiga:ro
      # Sauvegardes et states en local (écriture fréquente — CIFS déconseillé)
      - ./saves:/config/retroarch/saves
      - ./states:/config/retroarch/states
    shm_size: "1gb"
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.retroarch.rule=Host(`retroarch.kiwinet.me`)"
      - "traefik.http.routers.retroarch.entrypoints=websecure"
      - "traefik.http.routers.retroarch.tls.certresolver=letsencrypt"
      - "traefik.http.routers.retroarch.middlewares=secure-headers@file"
      - "traefik.http.services.retroarch.loadbalancer.server.port=3000"
      - "traefik.http.services.retroarch.loadbalancer.server.scheme=https"
      - "traefik.http.services.retroarch.loadbalancer.serverstransport=retroarch-transport@docker"
      - "traefik.http.serversTransports.retroarch-transport.insecureSkipVerify=true"

networks:
  proxy:
    external: true
