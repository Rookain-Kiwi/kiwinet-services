###############################################################################
# komf/docker-compose.yml : Komga Metadata Fetcher
# Projet  : kiwinet.me
# VM      : Debian 13.3 ARM AArch64 (Freebox Delta)
# Image   : sndxr/komf (officielle, compatible linux/arm64)
# Accès   : interne uniquement — pas d'exposition publique
###############################################################################
services:
  # ───────────────────────────────────────────────────────────────────────────
  # KOMF : Récupération automatique de métadonnées pour Komga
  # Se connecte à Komga via API key — pas de port exposé publiquement
  # Détecte automatiquement les nouvelles séries et met à jour les métadonnées
  # Périmètre : bibliothèque Mangas uniquement (MangaUpdates, AniList, MangaDex)
  # BD franco-belge : géré séparément via BedethequeKomga (script ponctuel)
  # ───────────────────────────────────────────────────────────────────────────
  komf:
    image: sndxr/komf:latest
    container_name: komf
    restart: unless-stopped
    security_opt:
      # AppArmor non disponible sur ce kernel ARM (Freebox Delta)
      # Nécessaire à la recréation du container — transparent au restart
      - apparmor:unconfined
    env_file: .env
    volumes:
      # Bind mount du répertoire de config — contient application.yml et database.sqlite
      - ./config:/config
    networks:
      - proxy

# ─────────────────────────────────────────────────────────────────────────────
# RÉSEAUX
# ─────────────────────────────────────────────────────────────────────────────
networks:
  proxy:
    external: true
