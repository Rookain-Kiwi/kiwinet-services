# ==============================================================================
# Synapse Logging Configuration — JSON format pour Loki/ELK
# ==============================================================================
# Format: JSON structuré pour intégration Promtail → Loki
# Sortie: stderr (Docker collecte automatiquement)

version: 1
disable_existing_loggers: false

# ==============================================================================
# [Formatters] — JSON + texte
# ==============================================================================

formatters:
  # Format texte classique (fallback)
  precise:
    format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'

  # Format JSON pour Loki (nom correct: JsonFormatter, pas JSONFormatter)
  json:
    (): synapse.logging.JsonFormatter
    default_fields:
      server: kiwinet
      component: synapse

# ==============================================================================
# [Handlers] — Où envoyer les logs
# ==============================================================================

handlers:
  # Console (stderr) — Docker récupère automatiquement
  console:
    class: logging.StreamHandler
    formatter: json
    stream: ext://sys.stdout

  # Fichier local (backup)
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: precise
    filename: /data/logs/synapse.log
    maxBytes: 104857600  # 100MB
    backupCount: 3

# ==============================================================================
# [Loggers] — Configuration par composant
# ==============================================================================

loggers:
  # Synapse core
  synapse:
    level: INFO
    handlers: [console, file]

  # Database queries (verbose)
  synapse.storage:
    level: INFO

  # HTTP access (pour auditing)
  synapse.http.server:
    level: INFO

  # Federation (pour debug Étape 2)
  synapse.federation:
    level: INFO

  # Registration & auth
  synapse.handlers.auth:
    level: INFO

  # Media uploads
  synapse.rest.media:
    level: INFO

# ==============================================================================
# [Root Logger]
# ==============================================================================

root:
  level: INFO
  handlers: [console, file]

# ==============================================================================
# [Disable Noisy Loggers]
# ==============================================================================

disable_noisy_loggers:
  twisted: true
  werkzeug: true
  aiohttp: true