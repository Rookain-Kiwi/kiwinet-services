# ============================================================================
# Synapse — Logging Configuration
# ============================================================================
# Format: standard Python logging avec timestamps
# Sortie: stdout (affichée dans logs Docker)
# Niveau: INFO (logs normaux + warnings + errors, pas de debug verbeux)
# ============================================================================

version: 1
disable_existing_loggers: false

# ──────────────────────────────────────────────────────────────────────────
# Formats
# ──────────────────────────────────────────────────────────────────────────

formatters:
  # Format détaillé: timestamp | module | ligne | niveau | request ID | message
  precise:
    format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'

# ──────────────────────────────────────────────────────────────────────────
# Handlers (où envoyer les logs)
# ──────────────────────────────────────────────────────────────────────────

handlers:
  # Stdout: affichage dans les logs Docker
  console:
    class: logging.StreamHandler
    formatter: precise
    stream: ext://sys.stdout

# ──────────────────────────────────────────────────────────────────────────
# Logger racine (tous les modules)
# ──────────────────────────────────────────────────────────────────────────

root:
  handlers: [console]
  # INFO = logs normaux + warnings + errors (sans debug verbeux)
  level: INFO

# ──────────────────────────────────────────────────────────────────────────
# Loggers spécifiques
# ──────────────────────────────────────────────────────────────────────────

loggers:
  # SQL queries: infos uniquement (pas les debug)
  synapse.storage.SQL:
    level: INFO