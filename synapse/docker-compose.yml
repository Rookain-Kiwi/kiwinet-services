version: "3.8"

services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse
    restart: unless-stopped
    networks:
      - proxy
      - db
    ports:
      - "127.0.0.1:8008:8008"  # Client API (localhost only, proxied via Traefik)
    volumes:
      - ./data:/data
      - ./homeserver.yaml:/data/homeserver.yaml:ro
      - ./logging.yaml:/data/logging.yaml:ro
    environment:
      - SYNAPSE_SERVER_NAME=kiwinet
      - SYNAPSE_REPORT_STATS=no
    env_file:
      - .env
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Traefik reverse proxy configuration
      - traefik.enable=true
      - traefik.http.routers.synapse.entrypoints=websecure
      - traefik.http.routers.synapse.rule=Host(`matrix.kiwinet.me`)
      - traefik.http.routers.synapse.tls=true
      - traefik.http.routers.synapse.tls.certresolver=letsencrypt
      - traefik.http.routers.synapse.service=synapse-svc
      - traefik.http.services.synapse-svc.loadbalancer.server.port=8008
      - traefik.http.services.synapse-svc.loadbalancer.server.scheme=http
      # Additional headers for security
      - traefik.http.middlewares.synapse-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff
      - traefik.http.middlewares.synapse-headers.headers.customresponseheaders.X-Frame-Options=SAMEORIGIN
      - traefik.http.routers.synapse.middlewares=synapse-headers

  postgres:
    image: postgres:16-alpine
    container_name: postgres-synapse
    restart: unless-stopped
    networks:
      - db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_stat_statements"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-synapse-db.sql:/docker-entrypoint-initdb.d/init-synapse-db.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"

networks:
  proxy:
    name: proxy
    external: true
  db:
    name: db
    external: true

volumes:
  postgres_data:
    driver: local
