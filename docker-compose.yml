###############################################################################
# docker-compose.yml : Infrastructure kiwinet.me
# Projet  : kiwinet.me
# VM      : Debian 13.3 ARM AArch64 (Freebox Delta)
# SSL     : Let's Encrypt : HTTP Challenge (IP fixe, port 80 ouvert)
###############################################################################

services:

  # ───────────────────────────────────────────────────────────────────────────
  # TRAEFIK : Point d'entrée unique HTTP/HTTPS
  # ───────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped

    ports:
      - "80:80"     # HTTP  → redirigé automatiquement vers HTTPS
                    #         aussi utilisé par Let's Encrypt HTTP Challenge
      - "443:443"   # HTTPS → trafic SSL principal
      - "25565:25565" # TCP  → Minecraft Java Edition (passthrough)

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme.json:/acme.json

    networks:
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.kiwinet.me`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth-basic@file"

  # ───────────────────────────────────────────────────────────────────────────
  # KIWINET-WEB : Site principal kiwinet.me
  # ───────────────────────────────────────────────────────────────────────────
  kiwinet-web:
    image: ghcr.io/rookain-kiwi/kiwinet-web:latest
    container_name: kiwinet-web
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kiwinet-web.rule=Host(`kiwinet.me`) || Host(`www.kiwinet.me`)"
      - "traefik.http.routers.kiwinet-web.entrypoints=websecure"
      - "traefik.http.routers.kiwinet-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.kiwinet-web.loadbalancer.server.port=80"
      - "traefik.http.routers.kiwinet-web.middlewares=secure-headers@file"

  # ───────────────────────────────────────────────────────────────────────────
  # LAVALINK : Moteur audio Java pour PlexBot
  # Pas d'exposition externe — communication interne uniquement
  # ───────────────────────────────────────────────────────────────────────────
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    environment:
      SERVER_PORT: "2333"
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD}
      _JAVA_OPTIONS: "-XX:+UseZGC -Xms256m -Xmx512m"
    volumes:
      - ./plexbot/lavalink.yml:/opt/Lavalink/application.yml:ro
      - lavalink-logs:/opt/Lavalink/logs
    networks:
      - proxy
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2333/version || true"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ───────────────────────────────────────────────────────────────────────────
  # PLEXBOT : Bot Discord — streaming musique Plex en vocal
  # Pas d'exposition externe — WebSocket sortant vers Discord API
  # ───────────────────────────────────────────────────────────────────────────
  plexbot:
    image: plexbot:latest
    container_name: plexbot
    restart: unless-stopped
    depends_on:
      lavalink:
        condition: service_healthy
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      PLEX_URL: ${PLEX_URL}
      PLEX_TOKEN: ${PLEX_TOKEN}
      LAVALINK_HOST: lavalink
      LAVALINK_SERVER_PORT: "2333"
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD}
      LAVALINK_SECURE: "false"
    volumes:
      - ./.env:/app/.env:ro
      - ./plexbot/config.fds:/app/config.fds:ro
      - plexbot-logs:/app/logs
    networks:
      - proxy
    labels:
      - "traefik.enable=false"

  # ───────────────────────────────────────────────────────────────────────────
  # MINECRAFT : Serveur Java Edition (Vanilla ou PaperMC) avec RCON activé
  # TCP brut routé via Traefik en passthrough sur le port 25565
  # ───────────────────────────────────────────────────────────────────────────
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    restart: unless-stopped
    environment:
      # Acceptation EULA Mojang — obligatoire
      EULA: "TRUE"
      # Vanilla le temps que PaperMC supporte la version 26.1
      # Repasser en TYPE: "PAPER" dès que Paper publie le support 26.1
      TYPE: "VANILLA"
      VERSION: "26.1"
      MEMORY: "4G"
      TZ: "Europe/Paris"
      # Applique les variables ci-dessous sur server.properties à chaque démarrage
      OVERRIDE_SERVER_PROPERTIES: "true"
      # Paramètres server.properties
      DIFFICULTY: "normal"
      GAMEMODE: "survival"
      MAX_PLAYERS: "6"
      WHITE_LIST: "true"
      ENFORCE_WHITELIST: "true"
      MOTD: "§2Bienvenue sur le serveur privé Kiwinet!"
      LEVEL: "kiwinet"
      # RCON : accès console à distance sans entrer dans le conteneur
      ENABLE_RCON: "true"
      RCON_PASSWORD: ${RCON_PASSWORD}
      RCON_PORT: "25575"
      # Plugins téléchargés automatiquement depuis Modrinth au démarrage
      # Ajouter les slugs Modrinth séparés par des virgules
      MODRINTH_PROJECTS: ""
    volumes:
      - minecraft-data:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=false"

# ─────────────────────────────────────────────────────────────────────────────
# RÉSEAUX
# ─────────────────────────────────────────────────────────────────────────────
networks:
  proxy:
    name: proxy
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  lavalink-logs:
    driver: local
  plexbot-logs:
    driver: local
  minecraft-data:
    driver: local