# dynamic.yml : Configuration dynamique Traefik
# Ce fichier est rechargé à chaud, aucun redémarrage requis.

http:
  middlewares:

    # Protection : dashboard Traefik, Prometheus, Grafana.
    auth-basic:
      basicAuth:
        users:
          - "rookain:$apr1$9IyBjbhP$10RRWUX7uBagQac8ZDv5X/"

    # Headers de sécurité HTTP pour les services exposés publiquement.
    secure-headers:
      headers:
        stsSeconds: 31536000          # HSTS 1 an
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true               # Anti-clickjacking
        contentTypeNosniff: true      # Anti-MIME sniffing
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""            # Masquer la stack technique
          Server: ""

    # Limitation de débit pour les endpoints publics.
    rate-limit:
      rateLimit:
        average: 100                  # Requêtes/seconde en régime normal
        burst: 50                     # Pic autorisé au-delà de la moyenne

  # Routeurs et services exposés.
  routers:

    # Plex Media Server : accès public via HTTPS.
    plex:
      rule: "Host(`plex.kiwinet.me`)"
      entryPoints:
        - websecure
      service: plex
      tls:
        certResolver: letsencrypt

  services:

    # Plex tourne en local : Traefik fait office de reverse proxy TLS.
    plex:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:32400"