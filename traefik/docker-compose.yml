###############################################################################
# traefik/docker-compose.yml : Reverse Proxy Traefik
# Projet  : kiwinet.me
# VM      : Debian 13.3 ARM AArch64 (Freebox Delta)
# Image   : traefik:v3 (compatible linux/arm64)
# SSL     : Let's Encrypt HTTP Challenge (IP fixe, port 80 ouvert)
###############################################################################

services:

  # ───────────────────────────────────────────────────────────────────────────
  # TRAEFIK : Point d'entrée unique HTTP/HTTPS
  # ───────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped

    ports:
      - "80:80"       # HTTP → redirigé vers HTTPS + HTTP Challenge Let's Encrypt
      - "443:443"     # HTTPS → trafic SSL principal
      - "25565:25565" # TCP → Minecraft Java Edition (passthrough)

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # API Docker — découverte automatique des services
      - ./traefik.yml:/etc/traefik/traefik.yml:ro     # Config statique — requiert restart si modifiée
      - /opt/seedbox/traefik-dynamic.yml:/etc/traefik/dynamic/dynamic.seedbox.yml:ro
      - ./dynamic/:/etc/traefik/dynamic/:ro           # Config dynamique — rechargée à chaud
      - ./acme.json:/acme.json                         # Stockage des certificats Let's Encrypt
      - ./.htpasswd:/etc/traefik/.htpasswd:ro          # Identifiants basic auth (gitignored)

    networks:
      - proxy

    labels:
      # Route du dashboard Traefik — protégée par basic auth (auth-basic@file dans dynamic.yml)
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.kiwinet.me`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth-basic@file"

# ─────────────────────────────────────────────────────────────────────────────
# RÉSEAUX
# ─────────────────────────────────────────────────────────────────────────────
networks:
  proxy:
    name: proxy
    driver: bridge