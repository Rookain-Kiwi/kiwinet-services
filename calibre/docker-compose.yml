###############################################################################
# calibre-web/docker-compose.yml : Serveur de bibliothèque Ebooks
# Projet  : kiwinet.me
# VM      : Debian 13.3 ARM AArch64 (Freebox Delta)
# Image   : lscr.io/linuxserver/calibre-web (LinuxServer.io, linux/arm64)
# Accès   : calibre.kiwinet.me (HTTPS via Traefik → port 8083 interne)
#
# Architecture bibliothèque :
#   - metadata.db + config → ./config (bind mount local VM)
#   - Fichiers ebooks      → ./books  (bind mount local VM)
#
# Les ebooks ne sont PAS hébergés sur le NAS Freebox — stockage local VM.
# Alimentation exclusivement via l'interface web Calibre-Web.
###############################################################################
services:
  # ───────────────────────────────────────────────────────────────────────────
  # CALIBRE-WEB : Interface web pour bibliothèque Calibre (EPUB, PDF, MOBI)
  # Stockage intégralement local — aucune dépendance CIFS/NAS
  # DOCKER_MODS active Calibre en arrière-plan pour la conversion de formats
  # ───────────────────────────────────────────────────────────────────────────
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped

    environment:
      # Utilisateur système correspondant à rookain sur la VM
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      # Mod LinuxServer : embarque Calibre pour la conversion EPUB/MOBI/PDF
      - DOCKER_MODS=linuxserver/mods:universal-calibre

    volumes:
      # Configuration et base de données SQLite (persistant, local VM)
      - ./config:/config
      # Bibliothèque ebooks — stockage local VM (hors NAS, hors CIFS)
      - ./books:/books

    networks:
      - proxy

    labels:
      # Exposition HTTPS via Traefik : certificat Let's Encrypt
      - "traefik.enable=true"
      - "traefik.http.routers.calibre-web.rule=Host(`calibre.kiwinet.me`)"
      - "traefik.http.routers.calibre-web.entrypoints=websecure"
      - "traefik.http.routers.calibre-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.calibre-web.loadbalancer.server.port=8083"
      - "traefik.http.routers.calibre-web.middlewares=secure-headers@file"

# ─────────────────────────────────────────────────────────────────────────────
# RÉSEAUX
# ─────────────────────────────────────────────────────────────────────────────
networks:
  proxy:
    external: true