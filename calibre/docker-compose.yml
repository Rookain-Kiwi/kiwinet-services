services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - DOCKER_MODS=linuxserver/mods:universal-calibre  # active la conversion de formats (EPUB/MOBI/PDF)

    volumes:
      - ./config:/config                          # base de données Calibre-Web + métadonnées
      - /mnt/Kodi/Lecture/Livres:/books           # bibliothèque Calibre (metadata.db + fichiers)

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calibre-web.rule=Host(`calibre.kiwinet.me`)"
      - "traefik.http.routers.calibre-web.entrypoints=websecure"
      - "traefik.http.routers.calibre-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.calibre-web.loadbalancer.server.port=8083"

networks:
  traefik:
    external: true
