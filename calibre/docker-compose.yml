###############################################################################
# calibre-web/docker-compose.yml : Serveur de bibliothèque Ebooks
# Projet  : kiwinet.me
# VM      : Debian 13.3 ARM AArch64 (Freebox Delta)
# Image   : lscr.io/linuxserver/calibre-web (LinuxServer.io, linux/arm64)
# Accès   : calibre.kiwinet.me (HTTPS via Traefik → port 8083 interne)
#
# Architecture bibliothèque :
#   - metadata.db   → ./config (bind mount local VM, hors CIFS)
#   - Fichiers EPUB → /mnt/Kodi/Lecture/Livres (CIFS, lecture seule)
#
# ⚠️  Le CIFS (SMB) est incompatible avec le locking exclusif SQLite.
#     La base Calibre ne peut pas résider sur le NAS Freebox.
#     "Separate Book Files from Library" doit être activé dans l'interface.
###############################################################################
services:
  # ───────────────────────────────────────────────────────────────────────────
  # CALIBRE-WEB : Interface web pour bibliothèque Calibre (EPUB, PDF, MOBI)
  # Base de données SQLite dans ./config (local VM, persistant hors CIFS)
  # Fichiers ebooks sur NAS Freebox (CIFS) en lecture seule
  # DOCKER_MODS active Calibre en arrière-plan pour la conversion de formats
  # ───────────────────────────────────────────────────────────────────────────
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped

    environment:
      # Utilisateur système correspondant à rookain sur la VM
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      # Mod LinuxServer : embarque Calibre pour la conversion EPUB/MOBI/PDF
      - DOCKER_MODS=linuxserver/mods:universal-calibre

    volumes:
      # Configuration et base de données SQLite (local VM — jamais sur CIFS)
      # Persiste entre les recreations du conteneur (bind mount, pas volume nommé)
      - ./config:/config
      # Fichiers ebooks sur NAS Freebox — lecture seule
      # ⚠️  Le mount CIFS /mnt/Kodi doit être actif sur la VM (via Ansible)
      # ⚠️  "Separate Book Files from Library" doit être activé dans l'interface
      - /mnt/Kodi/Lecture/Livres:/books:ro

    networks:
      - proxy

    labels:
      # Exposition HTTPS via Traefik : certificat Let's Encrypt
      - "traefik.enable=true"
      - "traefik.http.routers.calibre-web.rule=Host(`calibre.kiwinet.me`)"
      - "traefik.http.routers.calibre-web.entrypoints=websecure"
      - "traefik.http.services.calibre-web.loadbalancer.server.port=8083"
      - "traefik.http.routers.calibre-web.middlewares=secure-headers@file"

# ─────────────────────────────────────────────────────────────────────────────
# RÉSEAUX
# ─────────────────────────────────────────────────────────────────────────────
networks:
  proxy:
    external: true