###############################################################################
# ha/mosquitto/config/mosquitto.conf
# Broker MQTT local — LAN uniquement
###############################################################################

listener 1883
protocol mqtt

# Pas d'authentification pour démarrer (réseau local uniquement)
# À sécuriser avec password_file si exposition future envisagée
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type all
